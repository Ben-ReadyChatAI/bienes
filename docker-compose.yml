services:
  bienes:
    build: .
    container_name: bienes
    ports:
      - "5055:5055"
    environment:
      # Pulled from Coolify env-var management. Never bake into the image.
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      OPR_API_KEY: ${OPR_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
    volumes:
      - bienes-output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5055/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bienes-output:
